global:
  env: dev

secret:
  create: false
  existingName: safespot-secret
  externalSecret:
    enabled: true
    secretStoreName: ssm-parameter-store
    remoteRefs:
      dbUser: /safespot/dev/db/user
      dbPassword: /safespot/dev/db/password
      awsAccessKeyId: /safespot/dev/aws/access-key-id
      awsSecretAccessKey: /safespot/dev/aws/secret-access-key
      jwtSecret: /safespot/dev/jwt/secret
      jwtExpiration: /safespot/dev/jwt/expiration

apiCore:
  image:
    repository: ghcr.io/project-safespot/safespot-api-core
    tag: 45ab9d9
    pullPolicy: Always
  probes:
    livenessPath: /api/core/actuator/health
    readinessPath: /api/core/actuator/health/readiness
  service:
    annotations:
      alb.ingress.kubernetes.io/healthcheck-path: /api/core/actuator/health/readiness

apiPublicRead:
  image:
    repository: ghcr.io/project-safespot/safespot-api-public-read
    tag: 45ab9d9
    pullPolicy: Always
  probes:
    livenessPath: /api/public/actuator/health
    readinessPath: /api/public/actuator/health/readiness
  service:
    annotations:
      alb.ingress.kubernetes.io/healthcheck-path: /api/public/actuator/health/readiness
externalIngestion:
  image:
    repository: ghcr.io/project-safespot/safespot-external-ingestion
    tag: 45ab9d9
    pullPolicy: Always
nginx:
  enabled: false  # 프론트엔드는 CloudFront 정적 배포 — EKS에 nginx 불필요

configmap:
  springProfilesActive: dev

  aws:
    region: ap-northeast-2
    endpoint: ""  # LocalStack 제거 — 실 AWS 사용

  database:
    writerHost: CHANGE_ME_RDS_WRITER_ENDPOINT  # RDS 클러스터 writer 엔드포인트
    readerHost: CHANGE_ME_RDS_READER_ENDPOINT  # RDS 클러스터 reader 엔드포인트
    port: "5432"
    name: safespot

  # ALB는 path rewrite 없이 전달 → Spring Boot context-path로 prefix 흡수
  apiCore:
    contextPath: /api/core
  apiPublicRead:
    contextPath: /api/public

  redis:
    host: CHANGE_ME_ELASTICACHE_ENDPOINT  # ElastiCache Redis 엔드포인트
    port: "6379"

  sqs:
    coreEventQueueUrl: https://sqs.ap-northeast-2.amazonaws.com/CHANGE_ME_ACCOUNT_ID/safespot-core-events
    cacheRegenerationQueueUrl: https://sqs.ap-northeast-2.amazonaws.com/CHANGE_ME_ACCOUNT_ID/safespot-cache-regeneration
    disasterQueueUrl: https://sqs.ap-northeast-2.amazonaws.com/CHANGE_ME_ACCOUNT_ID/safespot-disaster-events
    environmentQueueUrl: https://sqs.ap-northeast-2.amazonaws.com/CHANGE_ME_ACCOUNT_ID/safespot-environment-events

ingress:
  className: alb
  host: api.safespot.site
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
    # HTTPS 전환 시 아래 항목 활성화 (ACM 인증서 ARN 발급 후)
    # alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    # alb.ingress.kubernetes.io/certificate-arn: CHANGE_ME_ACM_CERTIFICATE_ARN
    # alb.ingress.kubernetes.io/ssl-redirect: "443"
  apiCore:
    path: /api/core
    pathType: Prefix
  apiPublicRead:
    path: /api/public
    pathType: Prefix
  front:
    enabled: false  # 프론트엔드는 CloudFront — nginx 라우트 불필요
