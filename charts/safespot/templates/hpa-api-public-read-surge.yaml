{{- if and .Values.autoscaling.apiPublicReadSurge.enabled .Values.apiPublicReadSurge.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Values.apiPublicReadSurge.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.apiPublicReadSurge.name }}
    service: {{ .Values.apiPublicRead.name }}
    component: surge
    env: {{ .Values.global.env }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Values.apiPublicReadSurge.name }}

  # GitOps default. pre-scaling-controller patches this at runtime on disaster.
  # ArgoCD ignoreDifferences on /spec/minReplicas prevents selfHeal from reverting the patch.
  minReplicas: {{ .Values.autoscaling.apiPublicReadSurge.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.apiPublicReadSurge.maxReplicas }}
  metrics:
    # External metric is kept to preserve the aws-gitops-cleanup scaling contract.
    - type: External
      external:
        metric:
          name: {{ .Values.autoscaling.apiPublicReadSurge.metric.name }}
        target:
          type: AverageValue
          averageValue: {{ .Values.autoscaling.apiPublicReadSurge.metric.targetAverageValue | quote }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 3
          periodSeconds: 60
{{- end }}
