{{- if .Values.externalIngestion.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: safespot-external-ingestion-config
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.externalIngestion.name }}
    service: {{ .Values.externalIngestion.name }}
    env: {{ .Values.global.env }}
data:
  SPRING_PROFILES_ACTIVE: {{ .Values.configmap.springProfilesActive | quote }}
  DB_HOST: {{ .Values.configmap.database.writerHost | quote }}
  DB_PORT: {{ .Values.configmap.database.port | quote }}
  DB_NAME: {{ .Values.configmap.database.name | quote }}
  REDIS_HOST: {{ .Values.configmap.redis.host | quote }}
  REDIS_PORT: {{ .Values.configmap.redis.port | quote }}
  AWS_REGION: {{ .Values.configmap.aws.region | quote }}
  {{- if .Values.configmap.aws.endpoint }}
  AWS_ENDPOINT: {{ .Values.configmap.aws.endpoint | quote }}
  AWS_ENDPOINT_URL: {{ .Values.configmap.aws.endpoint | quote }}
  SQS_ENDPOINT: {{ .Values.configmap.aws.endpoint | quote }}
  {{- end }}
  SPRING_FLYWAY_ENABLED: "false"
  SPRING_DATASOURCE_URL: {{ printf "jdbc:postgresql://%s:%s/%s" .Values.configmap.database.writerHost .Values.configmap.database.port .Values.configmap.database.name | quote }}
  SPRING_DATA_REDIS_HOST: {{ .Values.configmap.redis.host | quote }}
  SPRING_DATA_REDIS_PORT: {{ .Values.configmap.redis.port | quote }}
  INGESTION_SQS_ENABLED: "true"
  # application 최종 확정 env (ingestion.sqs.* property 기준)
  INGESTION_SQS_CACHE_REFRESH_QUEUE_URL: {{ .Values.configmap.sqs.cacheRefreshQueueUrl | quote }}
  INGESTION_SQS_READMODEL_REFRESH_QUEUE_URL: {{ .Values.configmap.sqs.readModelRefreshQueueUrl | quote }}
  INGESTION_SQS_ENVIRONMENT_CACHE_REFRESH_QUEUE_URL: {{ .Values.configmap.sqs.environmentCacheRefreshQueueUrl | quote }}
  # deprecated — backward compat: old app 버전 롤백 시 이전 property 이름으로 동작 보장
  INGESTION_SQS_DISASTER_CACHE_QUEUE_URL: {{ .Values.configmap.sqs.readModelRefreshQueueUrl | quote }}
  INGESTION_SQS_ENVIRONMENT_CACHE_QUEUE_URL: {{ .Values.configmap.sqs.environmentCacheRefreshQueueUrl | quote }}
{{- end }}
