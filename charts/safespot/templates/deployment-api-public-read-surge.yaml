{{- if and .Values.apiPublicRead.enabled .Values.apiPublicReadSurge.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.apiPublicReadSurge.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.apiPublicReadSurge.name }}
    service: {{ .Values.apiPublicRead.name }}
    component: surge
    env: {{ .Values.global.env }}
spec:
  # 운영 기본값: replicas=1 (values.yaml).
  # 부하테스트: values-loadtest.yaml overlay로 replicas=6 override.
  # kubectl patch/scale만으로 변경하면 ArgoCD selfHeal이 values.yaml 기본값으로 되돌린다.
  replicas: {{ .Values.apiPublicReadSurge.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.apiPublicReadSurge.name }}
      service: {{ .Values.apiPublicRead.name }}
      component: surge
  template:
    metadata:
      labels:
        app: {{ .Values.apiPublicReadSurge.name }}
        service: {{ .Values.apiPublicRead.name }}
        component: surge
        env: {{ .Values.global.env }}
    spec:
      # Service/api-public-read selects on service: api-public-read,
      # so surge pods receive traffic automatically.
      serviceAccountName: {{ .Values.apiPublicRead.name }}
      {{- with .Values.scheduling.apiPublicReadSurge.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.scheduling.apiPublicReadSurge.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.scheduling.apiPublicReadSurge.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Values.apiPublicReadSurge.name }}
          image: "{{ .Values.apiPublicRead.image.repository }}:{{ .Values.apiPublicRead.image.tag }}"
          imagePullPolicy: {{ .Values.apiPublicRead.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.apiPublicRead.port }}
          envFrom:
            - configMapRef:
                name: safespot-api-public-read-config
            - secretRef:
                name: {{ .Values.secret.existingName }}
          resources:
            {{- toYaml .Values.apiPublicReadSurge.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: {{ .Values.apiPublicRead.probes.startupPath }}
              port: http
            timeoutSeconds: 5
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: {{ .Values.apiPublicRead.probes.readinessPath }}
              port: http
            timeoutSeconds: 5
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: {{ .Values.apiPublicRead.probes.livenessPath }}
              port: http
            timeoutSeconds: 5
            periodSeconds: 10
            failureThreshold: 3
{{- end }}
