name: Render dev infra values

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'charts/safespot/values-dev.infra.template.yaml'

permissions:
  id-token: write
  contents: write

concurrency:
  group: render-dev-values-${{ github.ref }}
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-northeast-2

      - name: Fetch SSM parameters and render values
        env:
          AWS_REGION: ap-northeast-2
        run: |
          chmod +x scripts/render-dev-values.sh
          ./scripts/render-dev-values.sh

      - name: Commit generated values
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add charts/safespot/values-dev.infra.generated.yaml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git pull --rebase origin main
            git commit -m "chore: regenerate values-dev.infra.generated.yaml from SSM"
            git push
          fi
