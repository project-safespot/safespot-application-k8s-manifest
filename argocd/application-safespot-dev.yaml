apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: safespot-dev
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/project-safespot/safespot-application-k8s-manifest.git
    targetRevision: feat/aws-gitops-cleanup  # dev EKS current stable branch; switch to main after final merge
    path: charts/safespot
    helm:
      valueFiles:
        - values-dev.infra.generated.yaml
        - values-dev.images.yaml
        - values-loadtest.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: application

  # pre-scaling-controller patches HPA/api-public-read-surge spec.minReplicas at runtime.
  # Without this, ArgoCD selfHeal would revert the patch to the GitOps default value,
  # disabling surge during an active disaster.
  ignoreDifferences:
    - group: autoscaling
      kind: HorizontalPodAutoscaler
      name: api-public-read-surge
      namespace: application
      jsonPointers:
        - /spec/minReplicas

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
