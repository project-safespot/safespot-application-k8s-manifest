---
# Source: safespot/templates/namespace.yaml
apiVersion: v1
kind: Namespace
metadata:
  name: application
  labels:
    env: dev
---
# Source: safespot/templates/secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: safespot-secret
  namespace: application
  labels:
    env: dev
type: Opaque
stringData:
  DB_USER: "safespot"
  DB_PASSWORD: "safespot1234"
  AWS_ACCESS_KEY_ID: "test"
  AWS_SECRET_ACCESS_KEY: "test"
  JWT_SECRET: "changeme"
---
# Source: safespot/templates/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: safespot-config
  namespace: application
  labels:
    env: dev
data:
  SPRING_PROFILES_ACTIVE: "dev"
  DB_HOST: "postgres-postgresql.safespot-db.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "safespot"
  REDIS_HOST: "redis-master.safespot-cache.svc.cluster.local"
  REDIS_PORT: "6379"
  AWS_REGION: "ap-northeast-2"
  AWS_ENDPOINT: "http://localstack.safespot-localstack.svc.cluster.local:4566"
---
# Source: safespot/templates/service-api-core.yaml
apiVersion: v1
kind: Service
metadata:
  name: api-core
  namespace: application
  labels:
    app: api-core
    service: api-core
    env: dev
spec:
  selector:
    app: api-core
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
---
# Source: safespot/templates/service-api-public-read.yaml
apiVersion: v1
kind: Service
metadata:
  name: api-public-read
  namespace: application
  labels:
