apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-ingestion
  namespace: {{ .Values.namespace }}
  labels:
    app: external-ingestion
    env: {{ .Values.env | default "dev" }}
spec:
  replicas: {{ .Values.services.externalIngestion.replicas | default 1 }}
  selector:
    matchLabels:
      app: external-ingestion
  template:
    metadata:
      labels:
        app: external-ingestion
        env: {{ .Values.env | default "dev" }}
    spec:
      serviceAccountName: external-ingestion
      containers:
        - name: external-ingestion
          image: "{{ .Values.services.externalIngestion.image }}:{{ .Values.services.externalIngestion.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "Always" }}
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: external-ingestion-config
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: safespot-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: safespot-secret
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: safespot-secret
                  key: JWT_SECRET
          resources:
            limits:
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
