apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-public-read
  namespace: {{ .Values.namespace }}
  labels:
    app: api-public-read
    env: {{ .Values.env | default "dev" }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-public-read
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
