apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: safespot-dev
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/project-safespot/safespot-application-k8s-manifest.git
    targetRevision: feat/aws-gitops-cleanup  # TODO: dev 배포 안정 브랜치 또는 릴리즈 tag로 변경
    path: charts/safespot
    helm:
      valueFiles:
        - values-dev.infra.generated.yaml
        - values-dev.images.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: application

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
