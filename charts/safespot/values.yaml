global:
  namespace: application
  env: dev

apiCore:
  enabled: true
  name: api-core
  image:
    repository: safespot/api-core
    tag: latest
    pullPolicy: Always
  replicas: 1
  port: 8080
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      memory: "512Mi"

apiPublicRead:
  enabled: true
  name: api-public-read
  image:
    repository: safespot/api-public-read
    tag: latest
    pullPolicy: Always
  replicas: 1
  port: 8080
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      memory: "512Mi"

externalIngestion:
  enabled: true
  name: external-ingestion
  image:
    repository: safespot/external-ingestion
    tag: latest
    pullPolicy: Always
  replicas: 1
  port: 8080
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      memory: "512Mi"

nginx:
  enabled: true
  name: nginx
  image:
    repository: safespot/nginx
    tag: latest
    pullPolicy: Always
  replicas: 1
  port: 80
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      memory: "512Mi"

configmap:
  springProfilesActive: dev

  dbHost: postgres-postgresql.safespot-db.svc.cluster.local
  dbPort: "5432"
  dbName: safespot

  redisHost: redis-master.safespot-cache.svc.cluster.local
  redisPort: "6379"

  awsRegion: ap-northeast-2
  awsEndpoint: http://localstack.safespot-localstack.svc.cluster.local:4566

  springDatasourceUrl: jdbc:postgresql://postgres-postgresql.safespot-db.svc.cluster.local:5432/safespot
  springDataRedisHost: redis-master.safespot-cache.svc.cluster.local
  springDataRedisPort: "6379"

  safespotSqsQueueUrl: http://localstack.safespot-localstack.svc.cluster.local:4566/000000000000/safespot-core-events

secret:
  create: false
  existingName: safespot-secret
  dbUser: ""
  dbPassword: ""
  awsAccessKeyId: ""
  awsSecretAccessKey: ""
  jwtSecret: ""
  jwtExpiration: "1800"

ingress:
  enabled: true
  className: nginx
  host: safespot.local
  annotations: {}

autoscaling:
  apiCore:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70

  apiPublicRead:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

  externalIngestion:
    enabled: true
    minReplicas: 1
    maxReplicas: 2
    targetCPUUtilizationPercentage: 70
