# Source: safespot/templates/ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: safespot-ingress
  namespace: application
  labels:
    env: dev
spec:
  ingressClassName: nginx
  rules:
    - host: safespot.local
      http:
        paths:
          - path: /api/core
            pathType: Prefix
            backend:
              service:
                name: api-core
                port:
                  number: 8080
          - path: /api/public
            pathType: Prefix
            backend:
              service:
                name: api-public-read
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx
                port:
                  number: 80
