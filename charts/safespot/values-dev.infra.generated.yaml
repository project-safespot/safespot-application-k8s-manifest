global:
  env: dev

secret:
  create: false
  existingName: safespot-secret
  externalSecret:
    enabled: true
    secretStoreName: ssm-parameter-store
    remoteRefs:
      dbUser: /safespot/dev/secret/rds/username
      dbPassword: /safespot/dev/secret/rds/password
      jwtAccessTokenKey: /safespot/dev/secret/jwt/access-token-key
      jwtRefreshTokenKey: /safespot/dev/secret/jwt/refresh-token-key
      seoulApiKey: /safespot/dev/secret/seoul/service-key
      moisApiKey: /safespot/dev/secret/mois/api-key
      dataGoKrApiKey: /safespot/dev/secret/data-go-kr/service-key

apiCore:
  replicas: 4
  resources:
    requests:
      cpu: "600m"
      memory: "1024Mi"
    limits:
      cpu: "1"
      memory: "1536Mi"
  serviceAccount:
    roleArn: arn:aws:iam::154335823230:role/safespot-dev-api-service-iam-role-api-core
  probes:
    # startupProbe: liveness endpoint만 확인해 full-health DB check 타임아웃 회피
    startupPath: /api/core/actuator/health/liveness
    livenessPath: /api/core/actuator/health/liveness
    readinessPath: /api/core/actuator/health/readiness
    startupInitialDelaySeconds: 10
    startupPeriodSeconds: 5
    startupTimeoutSeconds: 5
    startupFailureThreshold: 60
    readinessInitialDelaySeconds: 20
    readinessPeriodSeconds: 5
    readinessTimeoutSeconds: 5
    readinessFailureThreshold: 6
    livenessInitialDelaySeconds: 60
    livenessPeriodSeconds: 10
    livenessTimeoutSeconds: 5
    livenessFailureThreshold: 6
  extraEnv:
    - name: JAVA_TOOL_OPTIONS
      value: "-XX:MaxRAMPercentage=65 -XX:InitialRAMPercentage=40 -XX:+UseG1GC -XX:MaxGCPauseMillis=200"
    - name: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
      value: "8"
    - name: SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE
      value: "2"
    - name: SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT
      value: "5000"
    - name: SPRING_DATASOURCE_HIKARI_VALIDATION_TIMEOUT
      value: "2000"
    - name: SERVER_TOMCAT_THREADS_MAX
      value: "50"
    - name: SERVER_TOMCAT_THREADS_MIN_SPARE
      value: "10"
    - name: SERVER_TOMCAT_ACCEPT_COUNT
      value: "50"
  service:
    annotations:
      alb.ingress.kubernetes.io/healthcheck-path: /api/core/actuator/health/readiness

apiPublicRead:
  serviceAccount:
    roleArn: arn:aws:iam::154335823230:role/safespot-dev-api-service-iam-role-api-public-read
  probes:
    startupPath: /api/public/actuator/health
    livenessPath: /api/public/actuator/health/liveness
    readinessPath: /api/public/actuator/health/readiness
  service:
    annotations:
      alb.ingress.kubernetes.io/healthcheck-path: /api/public/actuator/health/readiness

externalIngestion:
  serviceAccount:
    roleArn: arn:aws:iam::154335823230:role/safespot-dev-api-service-iam-role-external-ingestion

preScalingController:
  serviceAccount:
    roleArn: arn:aws:iam::154335823230:role/safespot-dev-api-service-iam-role-pre-scaling-controller

scenarioSimulator:
  enabled: true
  serviceAccount:
    create: false
    name: api-core  # dev 임시: api-core IRSA SA 재사용. 추후 전용 role로 분리 권장

apiPublicReadSurge:
  enabled: true
  replicas: 1

nginx:
  enabled: false  # 프론트엔드는 CloudFront 정적 배포 — EKS에 nginx 불필요

configmap:
  springProfilesActive: dev

  aws:
    region: ap-northeast-2
    endpoint: ""  # LocalStack 제거 — 실 AWS 사용

  database:
    writerHost: safespot-dev-data-aurora-cluster.cluster-cd6mumwgwxw4.ap-northeast-2.rds.amazonaws.com
    readerHost: safespot-dev-data-aurora-cluster.cluster-ro-cd6mumwgwxw4.ap-northeast-2.rds.amazonaws.com
    port: "5432"
    name: safespot

  # ALB는 path rewrite 없이 전달 → Spring Boot context-path로 prefix 흡수
  apiCore:
    contextPath: /api/core
  apiPublicRead:
    contextPath: /api/public

  redis:
    host: safespot-dev-data-redis-main.kq1e8u.ng.0001.apn2.cache.amazonaws.com
    port: "6379"

  sqs:
    coreEventQueueUrl: https://sqs.ap-northeast-2.amazonaws.com/154335823230/safespot-dev-async-worker-sqs-cache-refresh
    cacheRegenerationQueueUrl: https://sqs.ap-northeast-2.amazonaws.com/154335823230/safespot-dev-async-worker-sqs-cache-refresh
    # Disaster cache regeneration uses the general cache_refresh queue.
    # async-worker does not expose a dedicated disaster_cache_refresh queue.
    # Do not map disasterQueueUrl to readmodel_refresh_queue_url.
    disasterQueueUrl: https://sqs.ap-northeast-2.amazonaws.com/154335823230/safespot-dev-async-worker-sqs-cache-refresh
    environmentQueueUrl: https://sqs.ap-northeast-2.amazonaws.com/154335823230/safespot-dev-async-worker-sqs-environment-cache-refresh

ingress:
  className: alb
  groupName: safespot-dev-api
  host: api-origin.safespot.site
  annotations:
    alb.ingress.kubernetes.io/load-balancer-name: safespot-dev-alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-northeast-2:154335823230:certificate/057acdfe-e3b0-49ab-9365-e9f84aced800
    alb.ingress.kubernetes.io/ssl-redirect: "443"
  apiCore:
    path: /api/core
    pathType: Prefix
  apiPublicRead:
    path: /api/public
    pathType: Prefix
  front:
    enabled: false  # 프론트엔드는 CloudFront — nginx 라우트 불필요

autoscaling:
  # api-core: MNG 2대 기준 warm capacity 확보, maxReplicas=5로 burst 1개 허용
  # Hikari maxPool=8 × 5 replicas = DB connection 40개 → RDS 안전 범위 내
  apiCore:
    enabled: true
    minReplicas: 4
    maxReplicas: 5
    targetCPUUtilizationPercentage: 60

  # api-public-read: MNG baseline 고정, HPA 비활성화
  apiPublicRead:
    enabled: false
    minReplicas: 1
    maxReplicas: 1
    targetCPUUtilizationPercentage: 70

  apiPublicReadSurge:
    enabled: true
    minReplicas: 1
    maxReplicas: 20
    metric:
      type: External
      name: api_public_read_requests_per_second
      targetAverageValue: "5"

scheduling:
  # api-core: MNG app node 전용, 2-node 균등 분산
  apiCore:
    nodeSelector:
      safespot.io/node-group: app
    tolerations: []
    affinity: {}
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app: api-core

  # api-public-read: MNG baseline 전용, HPA 비활성화로 replicas=1 고정
  apiPublicRead:
    nodeSelector:
      safespot.io/node-group: app
    tolerations: []
    affinity: {}

  externalIngestion:
    nodeSelector:
      safespot.io/node-group: app
    tolerations: []
    affinity: {}

  preScalingController:
    nodeSelector:
      safespot.io/node-group: app
    tolerations: []
    affinity: {}

  dbMigration:
    nodeSelector:
      safespot.io/node-group: app
    tolerations: []
    affinity: {}

  # api-public-read-surge: Karpenter public-read-surge node pool 전용
  # Karpenter NodePool taint: safespot.io/dedicated=public-read-surge:NoSchedule
  apiPublicReadSurge:
    nodeSelector:
      safespot.io/node-group: public-surge
    tolerations:
      - key: safespot.io/dedicated
        operator: Equal
        value: public-read-surge
        effect: NoSchedule
    affinity: {}
