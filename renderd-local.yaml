    service: api-public-read
    env: dev
spec:
  selector:
    app: api-public-read
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
---
# Source: safespot/templates/service-external-ingestion.yaml
apiVersion: v1
kind: Service
metadata:
  name: external-ingestion
  namespace: application
  labels:
    app: external-ingestion
    service: external-ingestion
    env: dev
spec:
  selector:
    app: external-ingestion
  ports:
    - port: 8080
