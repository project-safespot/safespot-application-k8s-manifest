{{- if and .Values.autoscaling.apiPublicReadSurge.enabled .Values.apiPublicReadSurge.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Values.apiPublicReadSurge.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.apiPublicReadSurge.name }}
    service: {{ .Values.apiPublicRead.name }}
    component: surge
    env: {{ .Values.global.env }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Values.apiPublicReadSurge.name }}
  minReplicas: {{ .Values.autoscaling.apiPublicReadSurge.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.apiPublicReadSurge.maxReplicas }}
  metrics:
    - type: External
      external:
        metric:
          name: {{ .Values.autoscaling.apiPublicReadSurge.metric.name }}
        target:
          type: AverageValue
          averageValue: {{ .Values.autoscaling.apiPublicReadSurge.metric.targetAverageValue | quote }}
{{- end }}
