---
# Source: safespot/templates/service-nginx.yaml
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: application
  labels:
    app: nginx
    service: nginx
    env: dev
spec:
  selector:
    app: nginx
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
---
# Source: safespot/templates/deployment-api-core.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-core
  namespace: application
  labels:
    app: api-core
    service: api-core
    env: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-core
  template:
    metadata:
      labels:
        app: api-core
        service: api-core
        env: dev
    spec:
      containers:
        - name: api-core
          image: "safespot/api-core:local"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: safespot-config
            - secretRef:
                name: safespot-secret
---
