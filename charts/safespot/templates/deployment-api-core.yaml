{{- if .Values.apiCore.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.apiCore.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.apiCore.name }}
    service: {{ .Values.apiCore.name }}
    env: {{ .Values.global.env }}
spec:
  {{- if not .Values.autoscaling.apiCore.enabled }}
  replicas: {{ .Values.apiCore.replicas }}
  {{- end }}
  selector:
    matchLabels:
      app: {{ .Values.apiCore.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.apiCore.name }}
        service: {{ .Values.apiCore.name }}
        env: {{ .Values.global.env }}
    spec:
      serviceAccountName: {{ .Values.apiCore.name }}
      {{- with .Values.scheduling.apiCore.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.scheduling.apiCore.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.scheduling.apiCore.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.scheduling.apiCore.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Values.apiCore.name }}
          image: "{{ .Values.apiCore.image.repository }}:{{ .Values.apiCore.image.tag }}"
          imagePullPolicy: {{ .Values.apiCore.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.apiCore.port }}
          envFrom:
            - configMapRef:
                name: safespot-api-core-config
            - secretRef:
                name: {{ .Values.secret.existingName }}
          {{- with .Values.apiCore.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.apiCore.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: {{ .Values.apiCore.probes.startupPath }}
              port: http
            initialDelaySeconds: {{ .Values.apiCore.probes.startupInitialDelaySeconds | default 0 }}
            timeoutSeconds: {{ .Values.apiCore.probes.startupTimeoutSeconds | default 5 }}
            periodSeconds: {{ .Values.apiCore.probes.startupPeriodSeconds | default 10 }}
            failureThreshold: {{ .Values.apiCore.probes.startupFailureThreshold | default 30 }}
          readinessProbe:
            httpGet:
              path: {{ .Values.apiCore.probes.readinessPath }}
              port: http
            initialDelaySeconds: {{ .Values.apiCore.probes.readinessInitialDelaySeconds | default 0 }}
            timeoutSeconds: {{ .Values.apiCore.probes.readinessTimeoutSeconds | default 5 }}
            periodSeconds: {{ .Values.apiCore.probes.readinessPeriodSeconds | default 5 }}
            failureThreshold: {{ .Values.apiCore.probes.readinessFailureThreshold | default 6 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.apiCore.probes.livenessPath }}
              port: http
            initialDelaySeconds: {{ .Values.apiCore.probes.livenessInitialDelaySeconds | default 0 }}
            timeoutSeconds: {{ .Values.apiCore.probes.livenessTimeoutSeconds | default 5 }}
            periodSeconds: {{ .Values.apiCore.probes.livenessPeriodSeconds | default 10 }}
            failureThreshold: {{ .Values.apiCore.probes.livenessFailureThreshold | default 3 }}
{{- end }}
