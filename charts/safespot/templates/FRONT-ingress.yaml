apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: safespot-front-ingress
  namespace: application
spec:
  ingressClassName: nginx
  rules:
    - host: safespot.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx
                port:
                  number: 80