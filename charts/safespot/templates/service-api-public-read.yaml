{{- if .Values.apiPublicRead.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.apiPublicRead.name }}
  namespace: {{ .Values.global.namespace }}
  {{- with .Values.apiPublicRead.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
    app: {{ .Values.apiPublicRead.name }}
    service: {{ .Values.apiPublicRead.name }}
    env: {{ .Values.global.env }}
spec:
  selector:
    # Single label selector so both base (app: api-public-read) and
    # surge (app: api-public-read-surge) pods are included as endpoints.
    # Both Deployments carry service: api-public-read on their pods.
    service: {{ .Values.apiPublicRead.name }}
  ports:
    - name: http
      port: 80
      targetPort: {{ .Values.apiPublicRead.port }}
      protocol: TCP
  type: ClusterIP
{{- end }}
