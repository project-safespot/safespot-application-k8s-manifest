{{- if .Values.preScalingController.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Values.preScalingController.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.preScalingController.name }}
    env: {{ .Values.global.env }}
rules:
  - apiGroups:
      - autoscaling
    resources:
      - horizontalpodautoscalers
    verbs:
      - get
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.preScalingController.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.preScalingController.name }}
    env: {{ .Values.global.env }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.preScalingController.name }}
    namespace: {{ .Values.global.namespace }}
roleRef:
  kind: Role
  name: {{ .Values.preScalingController.name }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}
