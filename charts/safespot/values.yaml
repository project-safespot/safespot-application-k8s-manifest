global:
  namespace: application
  env: dev

apiCore:
  enabled: true
  name: api-core
  image:
    repository: safespot/api-core
    tag: latest
    pullPolicy: Always
  replicas: 1
  port: 8080
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      memory: "512Mi"
  probes:
    livenessPath: /actuator/health
    readinessPath: /actuator/health/readiness
  service:
    annotations: {}

apiPublicRead:
  enabled: true
  name: api-public-read
  image:
    repository: safespot/api-public-read
    tag: latest
    pullPolicy: Always
  replicas: 1
  port: 8080
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      memory: "512Mi"
  probes:
    livenessPath: /actuator/health
    readinessPath: /actuator/health/readiness
  service:
    annotations: {}

externalIngestion:
  enabled: true
  name: external-ingestion
  image:
    repository: safespot/external-ingestion
    tag: latest
    pullPolicy: Always
  replicas: 1
  port: 8082
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      memory: "512Mi"

nginx:
  enabled: true
  name: nginx
  image:
    repository: safespot/nginx
    tag: latest
    pullPolicy: Always
  replicas: 1
  port: 80
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      memory: "512Mi"

configmap:
  springProfilesActive: dev

  redis:
    host: redis.safespot-cache.svc.cluster.local
    port: "6379"

  aws:
    region: ap-northeast-2
    endpoint: http://localstack.safespot-localstack.svc.cluster.local:4566

  sqs:
    coreEventQueueUrl: http://localstack.safespot-localstack.svc.cluster.local:4566/000000000000/safespot-core-events
    cacheRegenerationQueueUrl: http://localstack.safespot-localstack.svc.cluster.local:4566/000000000000/safespot-cache-regeneration
    disasterQueueUrl: http://localstack.safespot-localstack.svc.cluster.local:4566/000000000000/safespot-disaster-events
    environmentQueueUrl: http://localstack.safespot-localstack.svc.cluster.local:4566/000000000000/safespot-environment-events

  database:
    name: safespot
    port: "5432"
    writerHost: postgres-postgresql-primary.safespot-db.svc.cluster.local
    readerHost: postgres-postgresql-read.safespot-db.svc.cluster.local

  apiCore:
    contextPath: ""  # nginx rewrite 환경에서는 비워둠; ALB 환경은 values-dev에서 override
  apiPublicRead:
    contextPath: ""  # nginx rewrite 환경에서는 비워둠; ALB 환경은 values-dev에서 override

secret:
  create: false
  existingName: safespot-secret
  dbUser: ""
  dbPassword: ""
  jwtAccessTokenKey: ""
  jwtRefreshTokenKey: ""
  openapiServiceKey: ""
  weatherApiKey: ""
  airQualityApiKey: ""
  externalSecret:
    enabled: false
    secretStoreName: ssm-parameter-store
    refreshInterval: 1h
    remoteRefs:
      dbUser: ""
      dbPassword: ""
      jwtAccessTokenKey: ""
      jwtRefreshTokenKey: ""
      openapiServiceKey: ""
      weatherApiKey: ""
      airQualityApiKey: ""

ingress:
  enabled: true
  className: nginx
  host: safespot.local
  annotations: {}
  apiCore:
    path: /api/core(/|$)(.*)
    pathType: ImplementationSpecific
  apiPublicRead:
    path: /api/public(/|$)(.*)
    pathType: ImplementationSpecific
  front:
    enabled: true
    path: /
    pathType: Prefix

autoscaling:
  apiCore:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70

  apiPublicRead:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

  externalIngestion:
    enabled: true
    minReplicas: 1
    maxReplicas: 2
    targetCPUUtilizationPercentage: 70
