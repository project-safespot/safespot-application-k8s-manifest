apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: external-ingestion-netpol
  namespace: {{ .Values.namespace }}
  labels:
    app: external-ingestion
    env: {{ .Values.env | default "dev" }}
spec:
  podSelector:
    matchLabels:
      app: external-ingestion
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: ingress
      ports:
        - port: 8080
  egress:
    - {}
