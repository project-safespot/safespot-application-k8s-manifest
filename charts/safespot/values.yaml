global:
  namespace: application
  env: dev

apiCore:
  enabled: true
  name: api-core
  image:
    repository: safespot/api-core
    tag: latest
    pullPolicy: Always
  replicas: 1
  port: 8080
  env:
    JAVA_TOOL_OPTIONS: >
      -XX:+UseG1GC
      -XX:MaxRAMPercentage=60
      -XX:InitialRAMPercentage=30
      -XX:MinRAMPercentage=30
      -XX:+ExitOnOutOfMemoryError
      -Xlog:gc*:stdout:time,level,tags
  resources:
    requests:
      cpu: "300m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

apiPublicRead:
  enabled: true
  name: api-public-read
  image:
    repository: safespot/api-public-read
    tag: latest
    pullPolicy: Always
  replicas: 1
  port: 8080
  env:
    JAVA_TOOL_OPTIONS: >
      -XX:+UseG1GC
      -XX:MaxRAMPercentage=60
      -XX:InitialRAMPercentage=30
      -XX:MinRAMPercentage=30
      -XX:+ExitOnOutOfMemoryError
      -Xlog:gc*:stdout:time,level,tags
  resources:
    requests:
      cpu: "300m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

externalIngestion:
  enabled: true
  name: external-ingestion
  image:
    repository: safespot/external-ingestion
    tag: latest
    pullPolicy: Always
  replicas: 1
  port: 8082
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      memory: "512Mi"

nginx:
  enabled: true
  name: nginx
  image:
    repository: safespot/nginx
    tag: latest
    pullPolicy: Always
  replicas: 1
  port: 80
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      memory: "512Mi"

configmap:
  springProfilesActive: dev

  redis:
    host: redis.safespot-cache.svc.cluster.local
    port: "6379"

  aws:
    region: ap-northeast-2
    endpoint: http://localstack.safespot-localstack.svc.cluster.local:4566

  sqs:
    coreEventQueueUrl: http://localstack.safespot-localstack.svc.cluster.local:4566/000000000000/safespot-core-events
    cacheRegenerationQueueUrl: http://localstack.safespot-localstack.svc.cluster.local:4566/000000000000/safespot-cache-regeneration
    disasterQueueUrl: http://localstack.safespot-localstack.svc.cluster.local:4566/000000000000/safespot-disaster-events
    environmentQueueUrl: http://localstack.safespot-localstack.svc.cluster.local:4566/000000000000/safespot-environment-events

  database:
    name: safespot
    port: "5432"
    primaryHost: postgres-postgresql-primary.safespot-db.svc.cluster.local
    readHost: postgres-postgresql-read.safespot-db.svc.cluster.local

  apiCore:
    datasourceUrl: jdbc:postgresql://postgres-postgresql-primary.safespot-db.svc.cluster.local:5432/safespot

  apiPublicRead:
    datasourceUrl: jdbc:postgresql://postgres-postgresql-read.safespot-db.svc.cluster.local:5432/safespot

  externalIngestion:
    datasourceUrl: jdbc:postgresql://postgres-postgresql-primary.safespot-db.svc.cluster.local:5432/safespot

secret:
  create: false
  existingName: safespot-secret
  dbUser: ""
  dbPassword: ""
  awsAccessKeyId: ""
  awsSecretAccessKey: ""
  jwtSecret: ""
  jwtExpiration: "1800"

ingress:
  enabled: true
  className: nginx
  host: safespot.local
  annotations: {}

autoscaling:
  apiCore:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70

  apiPublicRead:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

  externalIngestion:
    enabled: true
    minReplicas: 1
    maxReplicas: 2
    targetCPUUtilizationPercentage: 70
