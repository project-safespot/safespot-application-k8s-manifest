global:
  namespace: application
  env: dev

apiCore:
  enabled: true
  name: api-core
  image:
    repository: safespot/api-core
    tag: latest
    pullPolicy: Always
  replicas: 1
  port: 8080
  resources:
    requests:
      cpu: "300m"
      memory: "1Gi"
  serviceAccount:
    roleArn: ""
  probes:
    startupPath: /api/core/actuator/health
    livenessPath: /api/core/actuator/health/liveness
    readinessPath: /api/core/actuator/health/readiness
  service:
    annotations: {}

apiPublicRead:
  enabled: true
  name: api-public-read
  image:
    repository: safespot/api-public-read
    tag: latest
    pullPolicy: Always
  replicas: 1
  port: 8080
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      memory: "512Mi"
  serviceAccount:
    roleArn: ""
  probes:
    startupPath: /api/public/actuator/health
    livenessPath: /api/public/actuator/health/liveness
    readinessPath: /api/public/actuator/health/readiness
  service:
    annotations: {}

externalIngestion:
  enabled: true
  name: external-ingestion
  image:
    repository: safespot/external-ingestion
    tag: latest
    pullPolicy: Always
  replicas: 1
  port: 8082
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      memory: "512Mi"
  serviceAccount:
    roleArn: ""

preScalingController:
  enabled: true
  name: pre-scaling-controller
  image:
    repository: safespot/pre-scaling-controller
    tag: latest
    pullPolicy: Always
  replicas: 1
  port: 8084
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      memory: "512Mi"
  serviceAccount:
    roleArn: ""
  probes:
    livenessPath: /actuator/health/liveness
    readinessPath: /actuator/health/readiness
  config:
    enabled: "true"
    targetHpaName: api-public-read-surge
    pollingIntervalMs: "30000"
    trigger:
      minLevelRank: "3"
      lookbackMinutes: "10"
    surge:
      normalMinReplicas: "1"
      disasterMinReplicas: "3"
      maxReplicas: "10"
      cooldownSeconds: "1800"

apiPublicReadSurge:
  enabled: true
  name: api-public-read-surge
  replicas: 1
  port: 8080
  resources:
    requests:
      cpu: "1500m"
      memory: "2048Mi"

scenarioSimulator:
  enabled: false
  name: scenario-simulator
  image:
    repository: safespot/scenario-simulator
    tag: latest
    pullPolicy: Always
  replicaCount: 1
  port: 8080
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  serviceAccount:
    create: false
    name: api-core  # dev: api-core IRSA SA 재사용 (SQS SendMessage 권한 공유)
    roleArn: ""
  probes:
    startupPath: /actuator/health
    readinessPath: /actuator/health/readiness
    livenessPath: /actuator/health/liveness

nginx:
  enabled: true
  name: nginx
  image:
    repository: safespot/nginx
    tag: latest
    pullPolicy: Always
  replicas: 1
  port: 80
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      memory: "512Mi"

configmap:
  springProfilesActive: dev

  redis:
    host: redis.safespot-cache.svc.cluster.local
    port: "6379"

  aws:
    region: ap-northeast-2
    endpoint: http://localstack.safespot-localstack.svc.cluster.local:4566

  sqs:
    coreEventQueueUrl: http://localstack.safespot-localstack.svc.cluster.local:4566/000000000000/safespot-core-events
    cacheRegenerationQueueUrl: http://localstack.safespot-localstack.svc.cluster.local:4566/000000000000/safespot-cache-regeneration
    disasterQueueUrl: http://localstack.safespot-localstack.svc.cluster.local:4566/000000000000/safespot-disaster-events
    environmentQueueUrl: http://localstack.safespot-localstack.svc.cluster.local:4566/000000000000/safespot-environment-events

  database:
    name: safespot
    port: "5432"
    writerHost: postgres-postgresql-primary.safespot-db.svc.cluster.local
    readerHost: postgres-postgresql-read.safespot-db.svc.cluster.local

  apiCore:
    contextPath: ""  # nginx rewrite 환경에서는 비워둠; ALB 환경은 values-dev에서 override
  apiPublicRead:
    contextPath: ""  # nginx rewrite 환경에서는 비워둠; ALB 환경은 values-dev에서 override

secret:
  create: false
  existingName: safespot-secret
  dbUser: ""
  dbPassword: ""
  jwtAccessTokenKey: ""
  jwtRefreshTokenKey: ""
  seoulApiKey: ""
  moisApiKey: ""
  dataGoKrApiKey: ""
  externalSecret:
    enabled: false
    secretStoreName: ssm-parameter-store
    refreshInterval: 1h
    remoteRefs:
      dbUser: ""
      dbPassword: ""
      jwtAccessTokenKey: ""
      jwtRefreshTokenKey: ""
      seoulApiKey: ""
      moisApiKey: ""
      dataGoKrApiKey: ""

ingress:
  enabled: true
  className: nginx
  groupName: safespot-api
  host: safespot.local
  annotations: {}
  apiCore:
    path: /api/core(/|$)(.*)
    pathType: ImplementationSpecific
    healthcheckPath: /api/core/actuator/health
  apiPublicRead:
    path: /api/public(/|$)(.*)
    pathType: ImplementationSpecific
    healthcheckPath: /api/public/actuator/health
  front:
    enabled: true
    path: /
    pathType: Prefix

autoscaling:
  apiCore:
    enabled: true
    minReplicas: 1
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70

  apiPublicRead:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

  externalIngestion:
    enabled: false
    minReplicas: 1
    maxReplicas: 1
    targetCPUUtilizationPercentage: 70

  # api-public-read-surge HPA는 External metric 기반 scale-to-zero 구조를 의도한다.
  # minReplicas=0은 HPAScaleToZero feature gate가 활성화된 클러스터에서만 사용 가능하다.
  # 현재 EKS 클러스터에서 HPAScaleToZero가 미지원이므로 minReplicas=1로 운영한다.
  # 재난 해소 시 pre-scaling controller가 Deployment를 직접 scale-to-0으로 관리한다.
  # Prometheus Adapter external metric rule 구성은 safespot-ops repo 후속 작업이다.
  apiPublicReadSurge:
    enabled: true
    minReplicas: 1
    maxReplicas: 20
    metric:
      type: External
      name: api_public_read_requests_per_second
      targetAverageValue: "5"

scheduling:
  apiCore:
    nodeSelector: {}
    tolerations: []
    affinity: {}

  apiPublicRead:
    nodeSelector: {}
    tolerations: []
    affinity: {}

  externalIngestion:
    nodeSelector: {}
    tolerations: []
    affinity: {}

  preScalingController:
    nodeSelector: {}
    tolerations: []
    affinity: {}

  dbMigration:
    nodeSelector: {}
    tolerations: []
    affinity: {}

  apiPublicReadSurge:
    nodeSelector: {}
    tolerations: []
    affinity: {}
