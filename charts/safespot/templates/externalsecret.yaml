{{- if .Values.secret.externalSecret.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.secret.existingName }}
  namespace: {{ .Values.global.namespace }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-1"
  labels:
    app: safespot
    service: safespot
    env: {{ .Values.global.env }}
spec:
  refreshInterval: {{ .Values.secret.externalSecret.refreshInterval }}
  secretStoreRef:
    # TODO: platform addon(safespot-terraform)의 ClusterSecretStore 이름과 일치하는지 확인 필요
    name: {{ .Values.secret.externalSecret.secretStoreName }}
    kind: ClusterSecretStore
  target:
    name: {{ .Values.secret.existingName }}
    creationPolicy: Owner
  data:
    - secretKey: DB_USER
      remoteRef:
        key: {{ .Values.secret.externalSecret.remoteRefs.dbUser }}
    - secretKey: DB_PASSWORD
      remoteRef:
        key: {{ .Values.secret.externalSecret.remoteRefs.dbPassword }}
    - secretKey: SPRING_DATASOURCE_USERNAME
      remoteRef:
        key: {{ .Values.secret.externalSecret.remoteRefs.dbUser }}
    - secretKey: SPRING_DATASOURCE_PASSWORD
      remoteRef:
        key: {{ .Values.secret.externalSecret.remoteRefs.dbPassword }}
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: {{ .Values.secret.externalSecret.remoteRefs.awsAccessKeyId }}
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: {{ .Values.secret.externalSecret.remoteRefs.awsSecretAccessKey }}
    - secretKey: JWT_SECRET
      remoteRef:
        key: {{ .Values.secret.externalSecret.remoteRefs.jwtSecret }}
    - secretKey: SAFESPOT_JWT_SECRET
      remoteRef:
        key: {{ .Values.secret.externalSecret.remoteRefs.jwtSecret }}
    - secretKey: SAFESPOT_JWT_EXPIRATION
      remoteRef:
        key: {{ .Values.secret.externalSecret.remoteRefs.jwtExpiration }}
{{- end }}
