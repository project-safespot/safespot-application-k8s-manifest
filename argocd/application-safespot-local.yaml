apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: safespot-local
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/project-safespot/safespot-application-k8s-manifest.git
    targetRevision: feat/aws-manifest-base
    path: charts/safespot
    helm:
      valueFiles:
        - values-local.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: application

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
