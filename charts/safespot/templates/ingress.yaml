{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: safespot-ingress
  namespace: {{ .Values.global.namespace }}
  labels:
    app: ingress
    service: ingress
    env: {{ .Values.global.env }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api/core
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.apiCore.name }}
                port:
                  number: {{ .Values.apiCore.port }}
          - path: /api/public
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.apiPublicRead.name }}
                port:
                  number: {{ .Values.apiPublicRead.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.nginx.name }}
                port:
                  number: {{ .Values.nginx.port }}
{{- end }}
